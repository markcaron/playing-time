<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="theme-color" content="#16213e" /> <!-- matches --pt-bg-primary -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <title>PlayingTime</title>
    <style>
      :root {
        --pt-bg-body: #1a1a2e;
        --pt-bg-primary: #16213e;
        --pt-bg-surface: #0f3460;
        --pt-bg-dark: #151515;
        --pt-bg-warning: #fef3c7;

        --pt-border: #1a4a7a;

        --pt-text: #e0e0e0;
        --pt-text-muted: #aaa;
        --pt-text-on-light: #555;
        --pt-text-white: #fff;

        --pt-accent: #4ea8de;
        --pt-accent-hover: #3a8fc4;

        --pt-danger: #e94560;
        --pt-danger-hover: #d13350;
        --pt-danger-light: #f87171;
        --pt-danger-on-light: #c1303e;

        --pt-success: #16a34a;
        --pt-success-hover: #15803d;
        --pt-success-light: #86efac;

        --pt-warning: #f0c040;
        --pt-warning-hover: #d4a830;

        --pt-hint: #7fff00;

        --pt-field-stripe-light: #2d6a4f;
        --pt-field-stripe-dark: #276749;
      }

      *,
      *::before,
      *::after {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html, body {
        height: 100%;
        background: var(--pt-bg-body);
        color: var(--pt-text);
        font-family: system-ui, -apple-system, sans-serif;
      }

      body {
        display: flex;
        flex-direction: column;
        min-height: 100%;
        padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
      }

      playing-time {
        width: 100%;
        flex: 1;
        display: flex;
        flex-direction: column;
      }
    </style>
    <script type="module" src="/src/index.ts"></script>
  </head>
  <body>
    <playing-time></playing-time>
  </body>
</html>
