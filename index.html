<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="theme-color" content="#16213e" /> <!-- matches --pt-bg-primary -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="stylesheet" href="/src/tokens.css" />
    <title>PlayingTime</title>
    <style>
      *,
      *::before,
      *::after {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html, body {
        height: 100%;
        background: var(--pt-bg-body);
        color: var(--pt-text);
        font-family: system-ui, -apple-system, sans-serif;
      }

      body {
        display: flex;
        flex-direction: column;
        min-height: 100%;
      }

      playing-time {
        width: 100%;
        flex: 1;
        display: flex;
        flex-direction: column;
      }

      /* View Transitions — slide animations */
      @keyframes slide-to-right {
        from { transform: translateX(0); opacity: 1; }
        to { transform: translateX(30%); opacity: 0; }
      }
      @keyframes slide-from-left {
        from { transform: translateX(-30%); opacity: 0; }
        to { transform: translateX(0); opacity: 1; }
      }
      @keyframes slide-to-left {
        from { transform: translateX(0); opacity: 1; }
        to { transform: translateX(-30%); opacity: 0; }
      }
      @keyframes slide-from-right {
        from { transform: translateX(30%); opacity: 0; }
        to { transform: translateX(0); opacity: 1; }
      }

      @keyframes slide-to-up {
        from { transform: translateY(0); opacity: 1; }
        to { transform: translateY(-30%); opacity: 0; }
      }
      @keyframes slide-from-bottom {
        from { transform: translateY(30%); opacity: 0; }
        to { transform: translateY(0); opacity: 1; }
      }
      @keyframes slide-to-bottom {
        from { transform: translateY(0); opacity: 1; }
        to { transform: translateY(30%); opacity: 0; }
      }
      @keyframes slide-from-top {
        from { transform: translateY(-30%); opacity: 0; }
        to { transform: translateY(0); opacity: 1; }
      }

      ::view-transition-old(root),
      ::view-transition-new(root) {
        animation-duration: 0.25s;
        animation-timing-function: ease-in-out;
      }

      ::view-transition-old(root) {
        animation-name: var(--pt-vt-old, slide-to-left);
      }
      ::view-transition-new(root) {
        animation-name: var(--pt-vt-new, slide-from-right);
      }
    </style>
    <script>
      (function() {
        var s = localStorage.getItem('pt-color-scheme');
        if (s === 'light' || s === 'dark') document.documentElement.style.colorScheme = s;
        var light = s === 'light' || (!s && window.matchMedia('(prefers-color-scheme: light)').matches);
        document.querySelector('meta[name="theme-color"]').setAttribute('content', light ? '#ffffff' : '#16213e');
      })();
    </script>
    <script type="module" src="/src/index.ts"></script>
  </head>
  <body>
    <playing-time></playing-time>
  </body>
</html>
